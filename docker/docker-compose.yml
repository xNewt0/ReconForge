version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - ../data:/app/data
    environment:
      - RECONFORGE_REDIS_URL=redis://redis:6379/0
      - RECONFORGE_DATABASE_URL=sqlite:///./data/reconforge.db
    depends_on:
      - redis
    restart: unless-stopped

  celery-worker:
    build:
      context: ../backend
    command: celery -A app.celery_app.celery worker --loglevel=info --concurrency=5
    volumes:
      - ../backend:/app
      - ../data:/app/data
    environment:
      - RECONFORGE_REDIS_URL=redis://redis:6379/0
      - RECONFORGE_DATABASE_URL=sqlite:///./data/reconforge.db
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
